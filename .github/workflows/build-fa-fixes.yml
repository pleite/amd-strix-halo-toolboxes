name: Build & Publish fa-fixes Toolbox

on:
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * 1'  # weekly Monday 06:00 UTC to track fork updates

permissions:
  contents: read
  packages: write

env:
  GHCR_REPO: ghcr.io/pleite/amd-strix-halo-toolboxes
  LOCAL_PREFIX: llama

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Free up runner disk space
        run: |
          echo "Before cleanup:" && df -h /
          sudo rm -rf \
            /usr/share/dotnet \
            /usr/local/lib/android \
            /opt/ghc \
            /opt/hostedtoolcache/CodeQL
          docker system prune --all --force
          docker builder prune --all --force
          echo "After cleanup:" && df -h /

      - uses: actions/checkout@v4

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set build timestamp
        run: echo "BUILD_TS=$(date +%Y%m%dT%H%M%S)" >> $GITHUB_ENV

      - name: Build vulkan-radv-fa-fixes
        working-directory: toolboxes
        shell: bash
        run: |
          set -euo pipefail
          DF="Dockerfile.vulkan-radv-fa-fixes"
          NAME="vulkan-radv-fa-fixes"
          LI="${LOCAL_PREFIX}-${NAME}"
          TAG="${NAME}_${{ env.BUILD_TS }}"
          IMM="${GHCR_REPO}:${TAG}"
          CHN="${GHCR_REPO}:${NAME}"

          echo "→ Building ${DF}"
          docker build --no-cache -t "${LI}" -f "${DF}" .

          echo "→ Smoke test..."
          docker run --rm "${LI}" llama-server --version

          echo "→ Tag & push immutable → ${IMM}"
          docker tag "${LI}" "${IMM}"
          docker push "${IMM}"

          echo "→ Tag & push channel → ${CHN}"
          docker tag "${IMM}" "${CHN}"
          docker push "${CHN}"

          echo "✅ Done: ${IMM}"
